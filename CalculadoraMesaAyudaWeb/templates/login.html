<!doctype html><html><head><link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css' rel='stylesheet'>
<style>body{display:flex;align-items:center;justify-content:center;height:100vh;background:linear-gradient(135deg,#082b57,#0d6efd)}.card{width:420px;border-radius:20px}</style></head>
<body><div class='card shadow'><div class='card-body p-4 text-center'><img src='/static/img/logo_qbitech.png' style='max-width:180px'><h3>Ingreso QBITECH</h3>
{% if error %}
<div class="alert alert-danger mt-3">
❌ {{ error }}
</div>
{% endif %}
<form method='post'><input type='hidden' name='_csrf_token' value='{{ csrf_token() }}'><input class='form-control mb-2' name='usuario' placeholder='Usuario' required autocomplete='username'><input type='password' class='form-control mb-2' name='clave' placeholder='Contraseña' required autocomplete='current-password'><button class='btn btn-primary w-100'>Ingresar</button></form>



</div></div>

</body></html>
