<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#eef2f7;
}

.sidebar{
    background:#082b57;
    color:#fff;
    min-height:100vh;
}

.cardq,.kpi{
    border:none;
    border-radius:16px;
    box-shadow:0 4px 14px rgba(0,0,0,.12);
}

.kpi{
    padding:15px;
    background:white;
    text-align:center;
}

.summary resumen-card{
    position:sticky;
    top:10px;
}

.cardq h4{
    color:#082b57;
    border-bottom:2px solid #e8eef7;
    padding-bottom:10px;
    margin-bottom:20px;
}
</style>

<script src='https://cdn.jsdelivr.net/npm/chart.js'></script>
<style>
.right-panel{
    position:sticky;
    top:10px;
    height:auto; min-height:calc(100vh - 40px);
    display:flex;
    flex-direction:column;
}
.resumen-card{
    
    overflow-y:auto;
}
.grafica-card{
    
    display:flex;
    flex-direction:column;
}
.grafica-card canvas{
    
    width:100% !important;
    height:100% !important;
}
.botones-panel{
    
}
@media(max-width:992px){
 .right-panel{position:relative;height:auto;}
}
</style>


<style>
.right-panel{display:flex;flex-direction:column}
.resumen-card{max-height:180px;overflow:auto}
.grafica-card{max-height:340px;overflow:hidden}
.botones-panel{display:flex;flex-direction:column;gap:8px;margin-top:10px}
</style>

<style>
/* Menús siempre visibles */
.sidebar{
 position:sticky !important;
 top:0;
 height:100vh;
 overflow-y:auto;
}
.right-panel{
 position:sticky !important;
 top:0;
 height:100vh;
 overflow-y:auto;
}

/* Reducir tamaño de torta */
#graficaCategorias{
 max-height:180px !important;
}

/* Reservar espacio para botones */
.botones-panel{
 position:sticky;
 bottom:0;
 background:#fff;
 padding:8px 0;
}
</style>


<style>
/* Sidebar profesional */
.sidebar, .left-menu, .menu-lateral{
    background: linear-gradient(180deg,#0b2d5c,#123b73)!important;
    box-shadow: 4px 0 15px rgba(0,0,0,.15);
}
.sidebar img, .left-menu img{
    background:#fff;
    border-radius:12px;
    padding:10px;
    box-shadow:0 4px 10px rgba(0,0,0,.15);
}
.sidebar a, .left-menu a{
    display:block;
    color:#fff!important;
    text-decoration:none;
    padding:12px 14px;
    border-radius:10px;
    margin:6px 8px;
    transition:.2s;
}
.sidebar a:hover, .left-menu a:hover{
    background:rgba(255,255,255,.12);
    transform:translateX(4px);
}
</style>


<style>
/* Ajustes móviles */
@media (max-width: 768px){
  .sidebar{
    position:relative !important;
    min-height:auto !important;
    height:auto !important;
    width:100% !important;
  }

  .right-panel{
    position:relative !important;
    top:auto !important;
    height:auto !important;
    overflow:visible !important;
  }

  .resumen-card,
  .grafica-card{
    max-height:none !important;
  }

  #graficaCategorias{
    max-height:220px !important;
    height:220px !important;
  }

  .botones-panel{
    position:relative !important;
    bottom:auto !important;
  }
}
</style>

</head>

<body>

<div class="container-fluid">

<div class="row">

    <div class="col-md-2 sidebar p-3">

        <img src="/static/img/logo_qbitech.png" style="width:100%">

        <hr>

        <h5></h5>

        <hr>

        <a href="/cotizaciones" style="color:white">
            📁 Cotizaciones
        </a>

        <br>

        <a href="/admin_login" style="color:white">
            📝 Administrador
        </a>

    </div>

    <div class="col-md-7 p-3">

        <div class="row mb-3" style="display:none;">

            <div class="col">

                <div class="kpi">

                    Total

                    <div id="ktotal">$0</div>

                </div>

            </div>

        </div>

        {% for categoria, items in categorias.items() %}

        <div class="cardq card mb-3">

            <div class="card-body">

                <h4>{{categoria}}</h4>

                {% for p in items %}

                <div class="mb-3">

                    <label class="form-label">

                        <b>{{p.variable}}</b>

                    </label>

                    {% if p.tipo == 'NUMERO' %}

                    <input
                        type="number"
                        min="0"
                        step="1"
                        class="form-control"
                        name="{{p.id}}">

                    {% else %}

                    <select
                        class="form-control sel"
                        name="{{p.id}}">

                        <option value="">
                            Seleccione
                        </option>

                        {% for o in p.opciones %}

                        <option value="{{o}}">
                            {{o}}
                        </option>

                        {% endfor %}

                    </select>

                    {% endif %}

                </div>

                {% endfor %}

            </div>

        </div>

        {% endfor %}

        

    </div>

    
<div class="col-lg-3 col-md-4 p-3 right-panel">

<div class="cardq card resumen-card mb-3">
<div class="card-body">
<h4>Resumen</h4>
<div style="text-align:center">
<h6>TOTAL ESTIMADO</h6>
<h2 id="total" style="color:#198754">$0</h2>
</div>
<h5>Resumen por Categoría</h5>
<div id="detalle"></div>
</div>
</div>

<div class="cardq card grafica-card mb-3">
<div class="card-body">
<h5>Distribución por Categoría</h5>
<canvas id="graficaCategorias" height="70"></canvas>
</div>
</div>

<div class="botones-panel">
<button onclick="guardar()" class="btn btn-success w-100 mb-2">Guardar Cotización</button>
<button onclick="limpiarFormulario()" class="btn btn-secondary w-100 mb-2">🧹 Limpiar Formulario</button>
<button onclick="generarPDF()" class="btn btn-danger w-100">📄 Generar Cotización PDF</button>
</div>

</div>

<script>


let chartCategorias=null;
function actualizarGrafica(datos){
 const ctx=document.getElementById('graficaCategorias');
 if(!ctx) return;
 if(chartCategorias) chartCategorias.destroy();
 const labels=Object.keys(datos||{});
 const values=Object.values(datos||{});
 if(labels.length===0) return;
 chartCategorias=new Chart(ctx,{type:'pie',data:{labels:labels,datasets:[{data:values}]},options:{responsive:true}});
}


function payload(){

    let r={};

    document.querySelectorAll('.sel').forEach(x=>{
        r[x.name]=x.value;
    });

    document.querySelectorAll("input[name]").forEach(x=>{
        r[x.name]=x.value;
    });

    return {
        respuestas:r
    };
}

function calcular(){

    fetch('/calcular',{

        method:'POST',

        headers:{
            'Content-Type':'application/json'
        },

        body:JSON.stringify(payload())

    })

    .then(r=>r.json())

    .then(d=>{

        ktotal.innerText =
            '$ ' +
            Number(d.total).toLocaleString('es-CO');

        total.innerText = ktotal.innerText;

        
        if(d.categorias){
            let html='';
            Object.entries(d.categorias).forEach(([cat,val])=>{
                if(Number(val)>0){
                    html += '<div style="display:flex;justify-content:space-between"><span>'+cat+'</span><b>$'+Number(val).toLocaleString('es-CO')+'</b></div>';
                }
            });
            detalle.innerHTML=html;
        }else{
            detalle.innerHTML=(d.detalle||'');
        }

        window.ult = d; try{actualizarGrafica(d.categorias||{});}catch(e){console.log(e);} 
    });
}

function guardar(){

    calcular();

    setTimeout(()=>{

        fetch('/guardar_cotizacion',{

            method:'POST',

            headers:{
                'Content-Type':'application/json'
            },

            body:JSON.stringify(window.ult || {})

        })
        .then(r=>r.json())
        .then(x=>alert(x.mensaje));

    },300);
}

function generarPDF(){

    fetch('/generar_pdf',{

        method:'POST',

        headers:{
            'Content-Type':'application/json'
        },

        body:JSON.stringify(window.ult || {})

    })
    .then(r=>r.blob())
    .then(b=>{

        const u = URL.createObjectURL(b);

        const a = document.createElement('a');

        a.href = u;

        a.download = 'Cotizacion_QBITECH.pdf';

        a.click();

    });
}

document.addEventListener('input',e=>calcular());

function limpiarFormulario(){

    document
        .querySelectorAll('input')
        .forEach(x=>x.value='');

    document
        .querySelectorAll('select')
        .forEach(x=>x.selectedIndex=0);

    document.getElementById('ktotal').innerText='$0';

    document.getElementById('total').innerText='$0';

    document.getElementById('detalle').innerHTML='';

    window.ult={}; if(chartCategorias){chartCategorias.destroy();chartCategorias=null;}
}

</script>

</body>
</html>
<style>
#graficaCategorias{max-height:110px!important;height:110px!important;}
.card:has(#graficaCategorias), .grafica-card{overflow:hidden!important;}
</style>
